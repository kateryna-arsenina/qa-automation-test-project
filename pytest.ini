[pytest]
testpaths = tests/unit tests/integration tests/smoke
addopts = -v
markers =
    smoke: lightweight, stateless health-check tests
    integration: tests that call reqres.in over the network
    unit: pure-function tests with no network calls
    resilience: simulate transient errors to demo retry and xfail behaviour
log_cli = true
log_cli_level = WARNING
log_cli_format = %(levelname)-8s %(message)s
